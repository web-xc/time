    <title>全球时钟</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        .container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
        }
        .clock {
            width: 300px;
            height: 300px;
            position: relative;
            border: 8px solid #000;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
        }
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            background: black;
            border-radius: 3px;
        }
        .h { width: 8px; height: 70px; background: black; }
        .m { width: 6px; height: 90px; background: black; }
        .s { width: 4px; height: 110px; background: red; }
        .center {
            position: absolute;
            width: 15px;
            height: 15px;
            background: red;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .country {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>

    <script>
        const timeZones = {
            uk: 0, // UTC
            us: -5, // EST (Eastern Standard Time)
            jp: 9, // Japan Standard Time
            cn: 8, // China Standard Time
            au: 11, // Australian Eastern Standard Time
            ru: 3 // Moscow Time
        };

        function createClock(countryId) {
            let clock = document.getElementById(countryId);
            let hourHand = document.createElement('div');
            let minuteHand = document.createElement('div');
            let secondHand = document.createElement('div');
            let centerDot = document.createElement('div');
            let label = document.createElement('div');
            
            hourHand.className = 'hand h';
            minuteHand.className = 'hand m';
            secondHand.className = 'hand s';
            centerDot.className = 'center';
            label.className = 'country';
            label.innerText = countryId.toUpperCase();
            
            clock.appendChild(hourHand);
            clock.appendChild(minuteHand);
            clock.appendChild(secondHand);
            clock.appendChild(centerDot);
            clock.appendChild(label);
            
            function updateClock() {
                let now = new Date();
                let utc = now.getTime() + now.getTimezoneOffset() * 60000;
                let localTime = new Date(utc + 3600000 * timeZones[countryId]);
                let h = localTime.getHours() % 12;
                let m = localTime.getMinutes();
                let s = localTime.getSeconds();
                
                hourHand.style.transform = `translateX(-50%) rotate(${h * 30 + m / 2}deg)`;
                minuteHand.style.transform = `translateX(-50%) rotate(${m * 6}deg)`;
                secondHand.style.transform = `translateX(-50%) rotate(${s * 6}deg)`;
            }
            
            setInterval(updateClock, 1000);
            updateClock();
        }

        Object.keys(timeZones).forEach(createClock);
    </script>
